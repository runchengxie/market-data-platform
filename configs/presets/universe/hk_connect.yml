# Default HK Connect universe settings (PIT + liquidity)
# backtest: fixed end_date; daily: end_date defaults to T-1
hk_connect_universe:
  mode: backtest
  start_date: 20150101
  end_date: 20251231
  rebalance_frequency: "M"
  lookback_days: 60
  min_window_days: 30
  top_quantile: 0.8
  min_turnover: 0
  out: "artifacts/assets/universe/hk_connect_full_by_date.csv"
  latest_out: "artifacts/assets/universe/hk_connect_full_symbols.txt"
  append_date: true
  write_meta: true
  meta_out: "artifacts/assets/universe/hk_connect_full_by_date.meta.yml"
  rqdata:
    username: null
    password: null
